<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicPro – Kirish</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F0F2F8;
            --bg2: #FFFFFF;
            --bg3: #F5F7FC;
            --border: rgba(67, 97, 238, 0.08);
            --border2: rgba(67, 97, 238, 0.15);
            --text: #1A1D3B;
            --text2: #475569;
            --text3: #94A3B8;
            --accent: #4361EE;
            --accent2: #3040CC;
            --green: #10B981;
            --red: #EF4444;
            --amber: #F59E0B;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(67, 97, 238, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 40px 36px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(67, 97, 238, 0.06);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 44px;
            margin-bottom: 8px;
        }

        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .logo-sub {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent);
            background: var(--bg2);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.08);
        }

        .form-control::placeholder {
            color: var(--text3);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text3);
            font-size: 18px;
            user-select: none;
            transition: color 0.15s;
        }

        .password-toggle:hover {
            color: var(--accent);
        }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--accent2);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--red);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-msg.show {
            display: block;
        }

        .role-hints {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .role-hint-title {
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .role-badges {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text2);
            font-weight: 600;
        }

        .role-badge:hover {
            transform: translateY(-2px);
            background: var(--bg2);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.1);
        }

        .badge-admin i {
            color: var(--accent);
        }

        .badge-doctor i {
            color: var(--green);
        }

        .badge-registrar i {
            color: var(--amber);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🏥</div>
            <div class="logo-title">ClinicPro</div>
            <div class="logo-sub">Klinika Boshqaruv Tizimi</div>
        </div>
        <div class="error-msg" id="error-msg">⚠️ Login yoki parol noto'g'ri!</div>
        <div class="form-group">
            <label class="form-label">Login</label>
            <input class="form-control" type="text" id="username" placeholder="Loginni kiriting..."
                autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label">Parol</label>
            <div class="password-wrapper">
                <input class="form-control" type="password" id="password" placeholder="Parolni kiriting..."
                    autocomplete="current-password" style="padding-right:40px">
                <span class="password-toggle" onclick="togglePassword()">👁</span>
            </div>
        </div>
        <button class="btn-login" onclick="doLogin()" id="login-btn">Kirish →</button>

        <div class="role-hints">
            <div class="role-hint-title">Tezkor kirish</div>
            <div class="role-badges">
                <div class="role-badge badge-admin" onclick="fillCreds('a123123*','a123123*')"
                    title="Admin sifatida kirish">
                    🔑 Admin
                </div>
                <div class="role-badge badge-doctor" onclick="fillCreds('sh123123*','sh123123*')"
                    title="Shifokor sifatida kirish">
                    👨‍⚕️ Shifokor
                </div>
                <div class="role-badge badge-registrar" onclick="fillCreds('r123123*','r123123*')"
                    title="Registratura sifatida kirish">
                    📋 Registratura
                </div>
            </div>
        </div>
    </div>

    <script>
        function fillCreds(u, p) {
            document.getElementById('username').value = u;
            document.getElementById('password').value = p;
            document.getElementById('error-msg').classList.remove('show');
        }
        function togglePassword() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('error-msg');
            if (!username || !password) { err.textContent = '⚠️ Login va parolni kiriting!'; err.classList.add('show'); return; }
            btn.textContent = 'Tekshirilmoqda...'; btn.disabled = true;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { err.textContent = '⚠️ ' + (data.error || 'Noto\'g\'ri login yoki parol!'); err.classList.add('show'); btn.textContent = 'Kirish →'; btn.disabled = false; return; }
                // Save role + username to sessionStorage
                sessionStorage.setItem('cp_role', data.role);
                sessionStorage.setItem('cp_user', data.username);
                window.location.href = '/';
            } catch (e) {
                err.textContent = '⚠️ Server bilan ulanib bo\'lmadi. Qayta urinib ko\'ring.';
                err.classList.add('show');
                btn.textContent = 'Kirish →'; btn.disabled = false;
            }
        }
        // Enter key support
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        // If already logged in, redirect
        if (sessionStorage.getItem('cp_role')) window.location.href = '/';
    </script>
</body>

</html>
